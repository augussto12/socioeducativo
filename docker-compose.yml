services:
  postgres:
    image: postgres:15-alpine
    container_name: socio_db
    environment:
      POSTGRES_DB: socioeducativo
      POSTGRES_USER: socio_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5440:5432" # Local host access only; services use the Docker network.
    networks:
      - socio_network
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U socio_admin -d socioeducativo"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./Backend
    container_name: socio_backend
    environment:
      DATABASE_URL: postgresql://socio_admin:${DB_PASSWORD:?Set DB_PASSWORD in .env}@postgres:5432/socioeducativo?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?Set JWT_ACCESS_SECRET in .env}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?Set JWT_REFRESH_SECRET in .env}
      ACCESS_TOKEN_EXPIRES_IN: ${ACCESS_TOKEN_EXPIRES_IN:-15m}
      REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN:-7d}
      NODE_ENV: production
      PORT: 3001
      CORS_ORIGIN: ${CORS_ORIGIN:?Set CORS_ORIGIN in .env}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      COOKIE_SAME_SITE: ${COOKIE_SAME_SITE:-lax}
      ADMIN_EMAIL: ${ADMIN_EMAIL:?Set ADMIN_EMAIL in .env}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
      UPLOAD_PUBLIC_DIR: ./uploads/public
      UPLOAD_PRIVATE_DIR: ./uploads/private
      MAX_IMAGE_SIZE: ${MAX_IMAGE_SIZE:-10485760}
      MAX_DOCUMENT_SIZE: ${MAX_DOCUMENT_SIZE:-26214400}
      MAX_AUDIO_SIZE: ${MAX_AUDIO_SIZE:-52428800}
      MAX_VIDEO_SIZE: ${MAX_VIDEO_SIZE:-262144000}
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - socio_network
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/api/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  frontend:
    build: ./Frontend
    container_name: socio_frontend
    depends_on:
      - backend
    networks:
      - socio_network
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: socio_nginx
    ports:
      - "${NGINX_PORT:-8094}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./uploads:/var/www/uploads:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - socio_network
      - npm_network
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  socio_network:
    driver: bridge
  npm_network:
    external: true
    name: nginx-proxy-manager_default
