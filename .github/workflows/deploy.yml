name: Verify and Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to deploy
        required: true
        default: main

env:
  DEPLOY_BRANCH: ${{ github.event.inputs.branch || github.ref_name }}

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: socioeducativo
          POSTGRES_USER: socio_admin
          POSTGRES_PASSWORD: ci_postgres_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U socio_admin -d socioeducativo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://socio_admin:ci_postgres_password@localhost:5432/socioeducativo?schema=public
      JWT_ACCESS_SECRET: github-actions-access-secret-for-verification
      JWT_REFRESH_SECRET: github-actions-refresh-secret-for-verification
      ACCESS_TOKEN_EXPIRES_IN: 15m
      REFRESH_TOKEN_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:5173
      COOKIE_DOMAIN: ""
      COOKIE_SECURE: "false"
      COOKIE_SAME_SITE: lax
      ADMIN_EMAIL: admin@socioeducativo.local
      ADMIN_PASSWORD: ci-only-temporary-admin-password
      UPLOAD_PUBLIC_DIR: ./uploads/public
      UPLOAD_PRIVATE_DIR: ./uploads/private
      MAX_IMAGE_SIZE: 10485760
      MAX_DOCUMENT_SIZE: 26214400
      MAX_AUDIO_SIZE: 52428800
      MAX_VIDEO_SIZE: 262144000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            Backend/package-lock.json
            Frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: Backend
        run: npm ci

      - name: Validate Prisma schema
        working-directory: Backend
        run: npx prisma validate

      - name: Run backend tests
        working-directory: Backend
        run: npm test

      - name: Audit backend production dependencies
        working-directory: Backend
        run: npm audit --omit=dev --audit-level=high

      - name: Install frontend dependencies
        working-directory: Frontend
        run: npm ci

      - name: Build frontend
        working-directory: Frontend
        run: npm run build

      - name: Audit frontend production dependencies
        working-directory: Frontend
        run: npm audit --omit=dev --audit-level=high

  deploy:
    runs-on: ubuntu-latest
    needs: verify
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          script: |
            set -e
            cd /home/socioeducativo

            set -a
            . ./.env
            set +a

            required_vars="DB_PASSWORD JWT_ACCESS_SECRET JWT_REFRESH_SECRET ACCESS_TOKEN_EXPIRES_IN REFRESH_TOKEN_EXPIRES_IN CORS_ORIGIN COOKIE_SECURE COOKIE_SAME_SITE ADMIN_EMAIL ADMIN_PASSWORD NGINX_PORT MAX_IMAGE_SIZE MAX_DOCUMENT_SIZE MAX_AUDIO_SIZE MAX_VIDEO_SIZE"
            for var in $required_vars; do
              if ! grep -Eq "^${var}=.+" .env; then
                echo "Missing required variable in /home/socioeducativo/.env: ${var}"
                exit 1
              fi
            done

            docker network inspect nginx-proxy-manager_default >/dev/null

            git fetch origin "${{ env.DEPLOY_BRANCH }}"
            git reset --hard "origin/${{ env.DEPLOY_BRANCH }}"

            docker compose config --quiet
            docker compose up -d --build --remove-orphans

            for i in $(seq 1 30); do
              if curl -fsS --max-time 5 http://127.0.0.1:${NGINX_PORT:-8094}/api/ready >/dev/null; then
                break
              fi

              if [ "$i" -eq 30 ]; then
                docker compose ps
                docker compose logs --tail=160 backend nginx
                exit 1
              fi

              sleep 5
            done

            curl -fsS --max-time 5 http://127.0.0.1:${NGINX_PORT:-8094}/api/health
            curl -fsS --max-time 5 http://127.0.0.1:${NGINX_PORT:-8094}/api/ready
            docker compose ps
